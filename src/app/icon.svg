<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>
  <!-- Clock face ring -->
  <circle cx="16" cy="16" r="11" stroke="#00ff88" stroke-width="1.5"/>
  <!-- Hour hand -->
  <line x1="16" y1="16" x2="16" y2="9" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="16" y1="16" x2="21" y2="16" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#00ff88"/>
  <!-- Terminal cursor indicator (bottom right of face) -->
  <rect x="20" y="21" width="4" height="2" rx="0.5" fill="#00ff88" opacity="0.7"/>
</svg>
